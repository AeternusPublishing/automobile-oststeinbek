<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Automobile Oststeinbek">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e3c476"/>
      <stop offset=".5" stop-color="#c9a24b"/>
      <stop offset="1" stop-color="#a8843a"/>
    </linearGradient>
  </defs>
  <!-- Außenring (das O – zugleich Rad) -->
  <circle cx="48" cy="48" r="45" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <circle cx="48" cy="48" r="38.5" fill="none" stroke="#c9a24b" stroke-width=".9" opacity=".55"/>
  <!-- Radnabe-Akzente -->
  <g stroke="#c9a24b" stroke-width="1" opacity=".5">
    <line x1="48" y1="3.5" x2="48" y2="9.5"/>
    <line x1="48" y1="86.5" x2="48" y2="92.5"/>
    <line x1="3.5" y1="48" x2="9.5" y2="48"/>
    <line x1="86.5" y1="48" x2="92.5" y2="48"/>
  </g>
  <!-- Das A im O -->
  <g fill="none" stroke="url(#gold)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M31 66 L48 27 L65 66"/>
    <line x1="37.5" y1="52" x2="58.5" y2="52"/>
  </g>
</svg>
